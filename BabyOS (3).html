<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby OS — Parenting Operating System</title>
<style>
:root {
  --navy:#1B3A6B;--teal:#2D8F8F;--white:#FFFFFF;
  --off:#F8F9FA;--lgray:#E9ECEF;--mgray:#ADB5BD;--dgray:#495057;
  --green:#0F6E56;--amber:#854F0B;--red:#C0392B;
  --purple:#534AB7;--blue:#185FA5;--coral:#993C1D;--pink:#993556;
  --green-bg:#E1F5EE;--amber-bg:#FAEEDA;--red-bg:#FCEBEB;
  --purple-bg:#EEEDFE;--blue-bg:#E6F1FB;--coral-bg:#FAECE7;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 4px rgba(0,0,0,.09);
  --bottom-bar:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);font-size:14px;background:#F0F2F5;color:#1a1a1a;min-height:100vh;padding-bottom:var(--bottom-bar);}

/* ── LAYOUT ── */
.app{display:block;}

/* ── TOP HEADER ── */
.top-bar{
  position:sticky;top:0;z-index:50;
  background:var(--navy);
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.top-bar-title{font-size:16px;font-weight:700;color:#fff;}
.top-bar-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.top-bar-menu{background:none;border:none;color:rgba(255,255,255,.8);font-size:22px;cursor:pointer;padding:4px;line-height:1;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:#fff;border-top:1px solid #e8e8e8;
  display:grid;grid-template-columns:repeat(5,1fr);
  height:var(--bottom-bar);
  box-shadow:0 -2px 10px rgba(0,0,0,.08);
}
.bnav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;padding:8px 4px;transition:background .15s;
  border:none;background:transparent;font-family:var(--font);
}
.bnav-item:active{background:#f5f5f5;}
.bnav-item.active{color:var(--teal);}
.bnav-item.active .bnav-icon{color:var(--teal);}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-label{font-size:9px;font-weight:500;color:#888;text-align:center;line-height:1.2;}
.bnav-item.active .bnav-label{color:var(--teal);font-weight:700;}

/* ── DRAWER (full-screen menu) ── */
.drawer-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
}
.drawer-overlay.open{display:block;}
.drawer{
  position:fixed;left:0;top:0;bottom:0;width:280px;z-index:201;
  background:var(--navy);overflow-y:auto;
  transform:translateX(-100%);transition:transform .25s ease;
}
.drawer.open{transform:translateX(0);}
.drawer-header{
  padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:space-between;
}
.drawer-header h1{font-size:17px;font-weight:700;color:#fff;}
.drawer-header p{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
.drawer-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer;padding:4px;}
.drawer-section{padding:12px 8px 2px;font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;margin:2px 6px;
  border-radius:var(--radius-sm);cursor:pointer;color:rgba(255,255,255,.75);font-size:13px;
  transition:background .15s;border:none;background:transparent;font-family:var(--font);width:calc(100% - 12px);text-align:left;
}
.nav-item:hover,.nav-item:active{background:rgba(255,255,255,.1);color:#fff;}
.nav-item.active{background:var(--teal);color:#fff;font-weight:600;}
.nav-item .icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}

/* ── MAIN ── */
.main{min-width:0;}
.page{display:none;padding:16px;max-width:680px;margin:0 auto;}
.page.active{display:block;}
.page-header{margin-bottom:16px;}
.page-header h2{font-size:20px;font-weight:700;color:var(--navy);}
.page-header p{font-size:12px;color:var(--dgray);margin-top:4px;line-height:1.4;}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:14px;}
.card-title{font-size:11px;font-weight:700;color:var(--dgray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

/* ── STAT CARDS ── */
.stat-card{border-radius:var(--radius);padding:12px 14px;text-align:center;}
.stat-card .val{font-size:24px;font-weight:700;color:#fff;line-height:1.1;}
.stat-card .lbl{font-size:10px;color:rgba(255,255,255,.8);margin-top:2px;}

/* ── PROGRESS ── */
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.prog-label{font-size:12px;color:#333;min-width:130px;}
.prog-track{flex:1;height:6px;background:var(--lgray);border-radius:3px;overflow:hidden;}
.prog-fill{height:6px;border-radius:3px;transition:width .5s;}
.prog-pct{font-size:11px;font-weight:700;min-width:32px;text-align:right;}

/* ── CHECKLIST ── */
.checklist-item{
  display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
  border-bottom:1px solid #f0f0f0;cursor:pointer;
  transition:background .1s;-webkit-user-select:none;user-select:none;
}
.checklist-item:last-child{border-bottom:none;}
.checklist-item:active{background:#fafafa;}
.checklist-item.done .item-text{text-decoration:line-through;color:var(--mgray);}
.checklist-item.done{opacity:.65;}
.check-box{
  width:22px;height:22px;border-radius:6px;border:2px solid #ccc;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  transition:background .15s,border-color .15s;font-size:13px;
}
.checklist-item.done .check-box{background:var(--green);border-color:var(--green);color:#fff;}
.item-text{font-size:13px;line-height:1.4;flex:1;}
.item-meta{font-size:11px;color:var(--mgray);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;}

/* ── SECTION HEADER ── */
.section-hdr{
  padding:9px 14px;font-size:12px;font-weight:700;color:#fff;
  border-radius:var(--radius-sm);margin:12px 0 4px;
}

/* ── TABLES ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:var(--teal);color:#fff;padding:9px 10px;text-align:left;font-weight:600;font-size:11px;}
.data-table td{padding:9px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top;}
.data-table tr:active td{background:#fafafa;}
.data-table tr.done td:not(:first-child){opacity:.5;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);}

/* ── INPUTS ── */
input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
  border:1.5px solid #e0e0e0;border-radius:var(--radius-sm);padding:9px 12px;
  font-size:14px;font-family:var(--font);background:#fff;color:#333;
  transition:border-color .15s;width:100%;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);}
.log-input{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.log-input label{font-size:11px;color:var(--dgray);display:block;margin-bottom:4px;font-weight:500;}

/* ── BUTTONS ── */
.btn{
  padding:11px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-size:14px;font-weight:600;font-family:var(--font);transition:opacity .15s;
  -webkit-user-select:none;user-select:none;
}
.btn:active{opacity:.8;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:#fff;border:1.5px solid #ddd;color:var(--dgray);}
.btn-sm{padding:7px 13px;font-size:12px;}
.btn-block{width:100%;text-align:center;}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tab-btn{
  padding:7px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;
  font-size:12px;cursor:pointer;font-family:var(--font);color:var(--dgray);
  white-space:nowrap;transition:all .15s;-webkit-user-select:none;user-select:none;
}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.tab-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.tab-scroll .tabs{flex-wrap:nowrap;}

/* ── FOOD CARDS ── */
.food-card{
  border:1.5px solid #e8e8e8;border-radius:var(--radius-sm);padding:10px 12px;
  cursor:pointer;transition:border-color .15s,background .15s;position:relative;
  -webkit-user-select:none;user-select:none;
}
.food-card:active{opacity:.85;}
.food-card.tried{background:#f0faf6;border-color:#a8dcc5;}
.food-card.concern{background:#fef9ec;border-color:#f0c060;}
.food-card .fname{font-size:12px;font-weight:700;color:#222;margin-bottom:4px;padding-right:20px;line-height:1.3;}
.food-card .fage{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:3px;}
.food-card .ftxt{font-size:10px;color:var(--dgray);line-height:1.3;}
.food-card .fnum{position:absolute;top:6px;right:8px;font-size:9px;color:#bbb;}
.food-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}

/* ── MILESTONE ── */
.milestone-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.milestone-row:active{background:#fafafa;}
.milestone-row.achieved .mtext{color:var(--mgray);text-decoration:line-through;}
.domain-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}

/* ── LOG ROWS ── */
.log-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #f5f5f5;font-size:12px;flex-wrap:wrap;}
.log-row:active{background:#fafafa;}
.log-cell{flex:1;min-width:0;}

/* ── DETAIL PANEL ── */
.detail-panel{background:#f5f7fa;border-left:3px solid var(--teal);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 14px;margin-top:8px;font-size:12px;color:#333;line-height:1.6;}
.detail-panel .dp-title{font-size:12px;font-weight:700;margin-bottom:6px;color:var(--navy);}

/* ── SIGN CARD ── */
.sign-card{border:1.5px solid #e8e8e8;border-radius:var(--radius);padding:14px;}
.sign-num{font-size:28px;font-weight:700;color:var(--purple);line-height:1;margin-bottom:4px;}
.sign-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;}

/* ── SUMMARY ROW ── */
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;}
.summary-row:last-child{border-bottom:none;}

/* ── VACCINE ROW ── */
.vax-upcoming{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f0f0f0;}
.vax-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.vax-name{font-size:12px;font-weight:500;flex:1;}
.vax-date{font-size:11px;color:var(--dgray);}
.vax-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;white-space:nowrap;}

/* ── EXPORT BAR ── */
.export-bar{
  position:fixed;bottom:calc(var(--bottom-bar) + 8px);right:12px;
  display:flex;gap:6px;z-index:99;align-items:center;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--bottom-bar) + 12px);left:50%;transform:translateX(-50%);
  background:#222;color:#fff;padding:10px 18px;border-radius:20px;
  font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px;}

/* ── VAX / TABLE CARD LAYOUT (mobile) ── */
.vax-card{
  background:#fff;border-radius:var(--radius);border:1.5px solid #eee;
  padding:12px 14px;margin-bottom:8px;position:relative;
}
.vax-card.given{background:#F0FFF8;border-color:#9FE1CB;}
.vax-card.overdue{border-color:#F0C0C0;background:#FFF8F8;}
.vax-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.vax-check{width:24px;height:24px;border-radius:6px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:13px;transition:all .15s;}
.vax-check.given{background:var(--green);border-color:var(--green);color:#fff;}
.vax-name{font-size:13px;font-weight:600;color:#1a1a1a;flex:1;line-height:1.3;}
.vax-card.given .vax-name{color:var(--mgray);text-decoration:line-through;}
.vax-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.vax-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;}
.vax-notes{font-size:11px;color:var(--dgray);line-height:1.4;margin-bottom:8px;}
.vax-date-row{display:flex;align-items:center;gap:8px;}
.vax-date-row label{font-size:11px;font-weight:600;color:var(--dgray);white-space:nowrap;}
.vax-date-row input{flex:1;font-size:13px;padding:7px 10px;}

/* ── ADD ITEM MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-sheet{
  background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:680px;
  padding:20px 18px 32px;max-height:85vh;overflow-y:auto;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.modal-field{margin-bottom:12px;}
.modal-field label{font-size:12px;font-weight:600;color:var(--dgray);display:block;margin-bottom:5px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-actions .btn{flex:1;}

/* ── EDITABLE LIST ITEM ── */
.item-actions{display:flex;gap:6px;margin-top:6px;}
.edit-btn{padding:4px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:11px;color:var(--dgray);cursor:pointer;font-family:inherit;}
.del-btn{padding:4px 8px;border-radius:6px;border:1px solid #FCEBEB;background:#FFF5F5;font-size:11px;color:var(--red);cursor:pointer;font-family:inherit;}

/* ── FLOATING ADD BUTTON ── */
.fab{
  position:fixed;bottom:calc(var(--bottom-bar) + 14px);left:16px;
  width:48px;height:48px;border-radius:50%;border:none;
  background:var(--teal);color:#fff;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.25);
  z-index:98;transition:background .15s;
}
.fab:active{background:var(--navy);}

/* ── BABY NAME IN HEADER ── */
.top-bar-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.top-bar-name .baby-emoji{margin-right:4px;}

/* ── NAV CUSTOMIZER ── */
.nav-customize-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.nav-slot{
  border:2px dashed #ddd;border-radius:10px;padding:10px 12px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.nav-slot.filled{border:2px solid var(--teal);background:#E6F5F5;}
.nav-slot-num{font-size:11px;font-weight:700;color:var(--teal);width:18px;flex-shrink:0;}
.nav-slot-icon{font-size:18px;}
.nav-slot-label{font-size:12px;font-weight:600;color:#333;flex:1;}
.nav-slot-clear{font-size:14px;color:#ccc;padding:2px 4px;}
.page-picker-list{max-height:55vh;overflow-y:auto;}
.page-picker-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:1px solid #f5f5f5;cursor:pointer;
}
.page-picker-item:active{background:#f8f8f8;}
.page-picker-icon{font-size:20px;width:28px;text-align:center;}
.page-picker-name{font-size:14px;font-weight:500;color:#222;}
.page-picker-group{font-size:11px;color:#888;margin-top:1px;}

@media(min-width:700px){
  .fab{bottom:24px;left:calc(230px + 20px);}
  .modal-sheet{border-radius:12px;margin-bottom:40px;}
  .modal-overlay{align-items:center;}
}

/* ── DESKTOP OVERRIDE ── */
@media(min-width:700px){
  body{padding-bottom:0;}
  .app{display:flex;min-height:100vh;}
  .top-bar{display:none;}
  .bottom-nav{display:none;}
  .drawer-overlay,.drawer{display:none!important;}
  .desktop-sidebar{
    width:230px;background:var(--navy);flex-shrink:0;
    display:flex!important;flex-direction:column;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .desktop-sidebar .drawer-header{display:flex;}
  .main{flex:1;overflow-y:auto;}
  .page{padding:24px;max-width:1000px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .food-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .export-bar{bottom:16px;}
  .toast{bottom:24px;}
}
@media(max-width:699px){
  .desktop-sidebar{display:none;}
  .grid-2{grid-template-columns:1fr;}
  .grid-3{grid-template-columns:1fr 1fr;}
  .log-input{grid-template-columns:1fr 1fr;}
}
</style>

<body>
<div class="app">

<!-- ── MOBILE TOP BAR ───────────────────────────────────────────────────── -->
<div class="top-bar">
  <div onclick="navTo('dashboard')" style="cursor:pointer;flex:1">
    <div class="top-bar-title" id="top-bar-title">🍼 Baby OS</div>
    <div class="top-bar-sub" id="top-bar-sub">Due: 19 June 2026</div>
  </div>
  <button class="top-bar-menu" onclick="openDrawer()" aria-label="Menu">☰</button>
</div>

<!-- ── DRAWER OVERLAY ────────────────────────────────────────────────────── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div><h1>🍼 Baby OS</h1><p id="drawer-sub">Due: 19 June 2026</p></div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-section">Overview</div>
  <button class="nav-item" onclick="navTo('dashboard')"><span class="icon">🏠</span> Dashboard</button>
  <div class="drawer-section">Pre-Birth</div>

// STATE MANAGEMENT — localStorage backed
// ══════════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'babyos_v1';

let state = {
  hospitalBag: {},    // itemIndex → {packed, notes}
  csection: {},       // taskIndex → {done, notes}
  pregTasks: {},      // taskIndex → {status}
  inventory: {},      // itemIndex → {owned, purchased, cost}
  milestones: {},     // milestoneIndex → {achieved, date, notes}
  vaccines: {},       // vaccineIndex → {given, date, notes}

  signs: {},          // signIndex → {learned, notes}
  babyDOB: null,      // string ISO date set when baby arrives
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const ind = document.getElementById('save-indicator');
    if (ind) {
      ind.style.display = 'block';
      clearTimeout(window._saveTimer);
      window._saveTimer = setTimeout(() => { ind.style.display = 'none'; }, 1500);
    }
  } catch(e) {}
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'babyos_backup_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('JSON backup exported!');
}

// ── EXPORT TO CSV (Google Sheets compatible) ─────────────────────────────────
function escCSV(v) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}
function rowCSV(arr) { return arr.map(escCSV).join(',') + '\n'; }

function buildCSVSheets() {
  const sheets = {};
  const now = new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});

  // ── HOSPITAL BAG
  let csv = rowCSV(['#','Category','Item','Qty','Priority','Packed','Section']);
  HOSPITAL_BAG.forEach((item, i) => {
    const s = state.hospitalBag[i] || {};
    csv += rowCSV([i+1, item.cat, item.item, item.qty, item.pri, s.packed ? 'Yes' : 'No', item.section]);
  });
  sheets['Hospital Bag'] = csv;

  // ── C-SECTION PREP
  csv = rowCSV(['#','Phase','Task','Owner','Target','Done']);
  CSECTION_TASKS.forEach((t, i) => {
    const s = state.csection[i] || {};
    csv += rowCSV([i+1, t.phase, t.task, t.owner, t.target, s.done ? 'Yes' : 'No']);
  });
  sheets['C-Section Prep'] = csv;

  // ── PREGNANCY TASKS
  csv = rowCSV(['#','Week','Category','Task','Priority','Done']);
  PREG_TASKS.forEach((t, i) => {
    const s = state.pregTasks[i] || {};
    csv += rowCSV([i+1, t.week, t.cat, t.task, t.pri, s.done ? 'Yes' : 'No']);
  });
  sheets['Pregnancy Tasks'] = csv;

  // ── NEWBORN INVENTORY
  csv = rowCSV(['#','Category','Item','Rec Qty','Priority','Purchased','Cost (Rp)']);
  NEWBORN_INVENTORY.forEach((item, i) => {
    const s = state.inventory[i] || {};
    csv += rowCSV([i+1, item.cat, item.item, item.qty, item.pri, s.purchased ? 'Yes' : 'No', s.cost ?? item.cost]);
  });
  sheets['Newborn Inventory'] = csv;

  // ── FEEDING LOG
  csv = rowCSV(['Date','Time','Left (min)','Right (min)','Formula (ml)','Pumped (ml)','Notes']);
  state.feedingLog.forEach(l => {
    csv += rowCSV([l.date, l.time, l.leftMin||0, l.rightMin||0, l.formulaMl||0, l.pumpedMl||0, l.notes||'']);
  });
  sheets['Feeding Log'] = csv;

  // ── SLEEP LOG
  csv = rowCSV(['Date','Start','End','Duration (hrs)','Type','Quality','Notes']);
  state.sleepLog.forEach(l => {
    let dur = '';
    if (l.start && l.end) {
      const h = Math.max(0,(new Date(l.date+'T'+l.end)-new Date(l.date+'T'+l.start))/3600000);
      dur = h.toFixed(2);
    }
    csv += rowCSV([l.date, l.start||'', l.end||'', dur, l.type||'', l.quality||'', l.notes||'']);
  });
  sheets['Sleep Log'] = csv;

  // ── DIAPER LOG
  csv = rowCSV(['Date','Time','Wet','Dirty','Stool Colour','Notes']);
  state.diaperLog.forEach(l => {
    csv += rowCSV([l.date, l.time||'', l.wet?'Yes':'No', l.dirty?'Yes':'No', l.color||'', l.notes||'']);
  });
  sheets['Diaper Log'] = csv;

  // ── 100 FOODS
  csv = rowCSV(['#','Food','Group','Rec Age','Texture','Allergen','Tried','Age Tried','Reaction','Notes','How to Prepare']);
  FOODS_ALL.forEach((f, i) => {
    const s = state.foods[i] || {};
    csv += rowCSV([f[0], f[1], f[2], f[3], f[4], f[5]?'Yes':'No',
      s.tried?'Yes':'No', s.ageTried||'', s.reaction||'None', s.notes||'', f[6]]);
  });
  sheets['100 Foods'] = csv;

  // ── VACCINES
  csv = rowCSV(['#','Vaccine','Rec Age','Due Date','Given','Date Given','Notes']);
  VACCINES.forEach((v, i) => {
    const s = state.vaccines[i] || {};
    const dueDate = new Date(DUE_DATE.getTime() + v.daysFromBirth * 86400000);
    const dueFmt = dueDate.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
    csv += rowCSV([i+1, v.name, v.age, dueFmt, s.given?'Yes':'No', s.date||'', v.notes]);
  });
  sheets['Vaccines'] = csv;

  // ── MILESTONES
  csv = rowCSV(['#','Age','Milestone','Domain','Achieved','Date Achieved','Red Flag','Concern','Tip']);
  MILESTONES.forEach((m, i) => {
    const s = state.milestones[i] || {};
    csv += rowCSV([i+1, m[0], m[2], m[3], s.achieved?'Yes':'No', s.date||'', m[5]?'Yes':'No', s.concern?'Yes':'No', m[4]||'']);
  });
  sheets['Milestones'] = csv;

  // ── BABY SIGNS
  csv = rowCSV(['#','Sign','Indonesian','English','Introduce At','Learned','How to Sign','Use When']);
  BABY_SIGNS.forEach((s, i) => {
    const st = state.signs[i] || {};
    csv += rowCSV([s.num, s.sign, s.indo, s.eng, s.age, st.learned?'Yes':'No', s.how, s.use]);
  });
  sheets['Baby Signs'] = csv;

  // ── BILINGUAL TRACKER
  csv = rowCSV(['Month','Indonesian %','English %','Preferred Language','Est. Total Words','Notes']);
  Array.from({length:24},(_,i) => {
    const k = 'bilingual_month_' + i;
    const s = state[k] || {};
    csv += rowCSV(['Month ' + (i+1), s.indoPct||'', s.engPct||'', s.lang||'', s.words||'', s.notes||'']);
  });
  sheets['Bilingual Tracker'] = csv;

  // ── KNOWLEDGE BASE (flatten all KB keys)
  csv = rowCSV(['Section','Field','Value']);
  Object.keys(state).filter(k => k.startsWith('kb_')).forEach(k => {
    const parts = k.replace('kb_','').split('_');
    const section = parts[0].replace(/([A-Z])/g,' $1').trim();
    const field = parts.slice(1).join(' ');
    csv += rowCSV([section, field, state[k]||'']);
  });
  sheets['Knowledge Base'] = csv;

  // ── SUMMARY
  const bagDone = HOSPITAL_BAG.filter((_,i) => state.hospitalBag[i]?.packed).length;
  const csecDone = CSECTION_TASKS.filter((_,i) => state.csection[i]?.done).length;
  const tasksDone = PREG_TASKS.filter((_,i) => state.pregTasks[i]?.done).length;
  const invDone = NEWBORN_INVENTORY.filter((_,i) => state.inventory[i]?.purchased).length;
  const foodsDone = FOODS_ALL.filter((_,i) => state.foods[i]?.tried).length;
  const milDone = MILESTONES.filter((_,i) => state.milestones[i]?.achieved).length;
  const vaxDone = VACCINES.filter((_,i) => state.vaccines[i]?.given).length;
  const totalSpend = NEWBORN_INVENTORY.reduce((a,_,i) => a+(state.inventory[i]?.purchased?(state.inventory[i]?.cost||0):0),0);

  csv = rowCSV(['Section','Done','Total','% Complete','Notes']);
  csv += rowCSV(['Hospital Bag', bagDone, HOSPITAL_BAG.length, Math.round(bagDone/HOSPITAL_BAG.length*100)+'%','']);
  csv += rowCSV(['C-Section Prep', csecDone, CSECTION_TASKS.length, Math.round(csecDone/CSECTION_TASKS.length*100)+'%','']);
  csv += rowCSV(['Pregnancy Tasks', tasksDone, PREG_TASKS.length, Math.round(tasksDone/PREG_TASKS.length*100)+'%','']);
  csv += rowCSV(['Newborn Inventory', invDone, NEWBORN_INVENTORY.length, Math.round(invDone/NEWBORN_INVENTORY.length*100)+'%','Purchased']);
  csv += rowCSV(['100 Foods', foodsDone, 100, foodsDone+'%','']);
  csv += rowCSV(['Milestones', milDone, MILESTONES.length, Math.round(milDone/MILESTONES.length*100)+'%','']);
  csv += rowCSV(['Vaccines', vaxDone, VACCINES.length, Math.round(vaxDone/VACCINES.length*100)+'%','']);
  csv += rowCSV(['Feeding Log entries', state.feedingLog.length, '—', '—','']);
  csv += rowCSV(['Sleep Log entries', state.sleepLog.length, '—', '—','']);
  csv += rowCSV(['Diaper Log entries', state.diaperLog.length, '—', '—','']);
  csv += rowCSV(['Total inventory spend', 'Rp '+totalSpend.toLocaleString(), '—', '—','IDR']);
  csv += rowCSV(['Export date', now, '—', '—','']);
  if (state.babyDOB) {
    const d = Math.max(0,Math.floor((new Date()-new Date(state.babyDOB))/86400000));
    csv += rowCSV(['Baby age', d+' days old', '—', '—', 'Born '+state.babyDOB]);
  }
  sheets['Summary'] = csv;

  return sheets;
}

function loadImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      state = { ...state, ...parsed };
      saveState();
      toast('Data imported! Refreshing...');
      setTimeout(() => location.reload(), 800);
    } catch(err) {
      toast('Import failed — invalid file.');
    }
  };
  reader.readAsText(file);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function daysUntil(d) { return Math.round((new Date(d) - new Date()) / 86400000); }
function daysOld() {
  if (!state.babyDOB) return null;
  return Math.max(0, Math.floor((new Date() - new Date(state.babyDOB)) / 86400000));
}
function weeksOld() {
  const d = daysOld();
  return d === null ? null : Math.floor(d / 7);
}
function babyAgeLbl() {
  const d = daysOld();
  if (d === null) return null;
  if (d < 14) return `${d} days old`;
  if (d < 60) return `${Math.floor(d/7)} weeks old`;
  const m = Math.floor(d / 30.5);
  return `${m} month${m !== 1 ? 's' : ''} old`;
}
function dueOrBirth() {
  return state.babyDOB ? new Date(state.babyDOB) : DUE_DATE;
}
function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'});
}
function priColor(p) {
  return {Essential:"#C0392B",High:"#E67E22",Medium:"#185FA5",Low:"#ADB5BD"}[p] || "#888";
}
function priTag(p) {
  const colors = {Essential:"#C0392B",High:"#E67E22",Medium:"#185FA5",Low:"#ADB5BD"};
  const bgs = {Essential:"#FCEBEB",High:"#FEF0E6",Medium:"#E6F1FB",Low:"#F8F9FA"};
  return `<span class="badge" style="background:${bgs[p]||'#f0f0f0'};color:${colors[p]||'#888'}">${p}</span>`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function pctBar(pct, color, height=7) {
  return `<div style="height:${height}px;background:#E9ECEF;border-radius:4px;overflow:hidden;margin-top:3px">
    <div style="height:${height}px;width:${Math.round(pct)}%;background:${color};border-radius:4px;transition:width .5s"></div>
  </div>`;
}

PAGES['hospital-bag'] = function(el) {
  const packedCount = HOSPITAL_BAG.filter((_,i) => state.hospitalBag[i]?.packed).length;
  const pct = Math.round(packedCount / HOSPITAL_BAG.length * 100);

  el.innerHTML = `
    <div class="page-header">
      <h2>🎒 Hospital Bag Checklist</h2>
      <p>Packed ${packedCount} of ${HOSPITAL_BAG.length + (state.customBagItems||[]).length} items · ${pct}% complete</p>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span class="card-title" style="margin:0">Overall packing progress</span>
        <span style="font-size:20px;font-weight:700;color:#0F6E56">${pct}%</span>
      </div>
      ${pctBar(pct,'#0F6E56',10)}

      ${sections.map(s => `<button class="tab-btn ${s==='Mother'?'active':''}" onclick="filterBag('${s}',this)">${s==='Mother'?'👩 Mother':s==='Baby'?'👶 Baby':s==='Father'?'👨 Father':'📄 Documents'}</button>`).join('')}
      <button class="tab-btn" onclick="filterBag('all',this)">All</button>
    </div>
    <div id="bag-list"></div>
  `;
  renderBag('Mother');

function filterBag(section, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBag(section);
}

function renderBag(section) {
  const items = section === 'all' ? HOSPITAL_BAG : HOSPITAL_BAG.filter(i => i.section === section);
  const cats = [...new Set(items.map(i => i.cat))];
  let html = '';
  cats.forEach(cat => {
    const catItems = items.filter(i => i.cat === cat);
    html += `<div class="section-hdr" style="background:#1B3A6B">${cat}</div>`;
    catItems.forEach(item => {
      const idx = HOSPITAL_BAG.indexOf(item);
      const packed = state.hospitalBag[idx]?.packed;
      html += `<div class="checklist-item ${packed?'done':''}" onclick="toggleBag(${idx})">
        <div class="check-box">${packed?'✓':''}</div>
        <div style="flex:1">
          <div class="item-text">${item.item}</div>
          <div class="item-meta">Qty: ${item.qty} &nbsp; ${priTag(item.pri)}</div>
        </div>
      </div>`;
    });
  });
  // Add custom items
  const customItems = state.customBagItems || [];
  if (customItems.length > 0 || section === 'all') {
    const customFiltered = section === 'all' ? customItems : customItems.filter(i => i.section === section);
    if (customFiltered.length > 0) {
      html += `<div class="section-hdr" style="background:#534AB7">⭐ Custom Items</div>`;
      customFiltered.forEach((item, ci) => {
        const idx = HOSPITAL_BAG.length + (state.customBagItems||[]).indexOf(item);
        const packed = state.hospitalBag[idx]?.packed;
        html += `<div class="checklist-item ${packed?'done':''}">
          <div class="check-box" onclick="toggleBag(${idx})">${packed?'✓':''}</div>
          <div style="flex:1" onclick="toggleBag(${idx})">
            <div class="item-text">${item.item}</div>
            <div class="item-meta">${item.section} <span class="badge" style="background:#EEEDFE;color:#534AB7">Custom</span></div>
          </div>
          <button onclick="delBagItem(${ci})" class="del-btn">✕</button>
        </div>`;
      });
    }
  }

  document.getElementById('bag-list').innerHTML = `
    <div class="card" style="padding:8px 0">${html}</div>
    <button class="btn btn-teal btn-block" onclick="openAddBagModal()" style="margin-bottom:80px">+ Add custom item</button>
  `;
}

window.openAddBagModal = () => {
  let m = document.getElementById('add-bag-modal');
  if (!m) {
    m = document.createElement('div');
    m.className = 'modal-overlay';
    m.id = 'add-bag-modal';
    m.innerHTML = `<div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">➕ Add Custom Item</div>
      <div class="modal-field"><label>Item name *</label><input type="text" id="ab-name" placeholder="e.g. Favourite pillow"></div>
      <div class="modal-field"><label>Section</label>
        <select id="ab-section">
          <option value="Mother">👩 Mother</option>
          <option value="Baby">👶 Baby</option>
          <option value="Father">👨 Father</option>
          <option value="Documents">📄 Documents</option>
        </select>
      </div>
      <div class="modal-field"><label>Priority</label>
        <select id="ab-pri"><option>Essential</option><option>High</option><option>Medium</option><option>Low</option></select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="document.getElementById('add-bag-modal').classList.remove('open')">Cancel</button>
        <button class="btn btn-teal" onclick="saveCustomBagItem()">Add item</button>
      </div>
    </div>`;
    document.body.appendChild(m);
    m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
  }
  m.classList.add('open');
};

window.saveCustomBagItem = () => {
  const name = document.getElementById('ab-name').value.trim();
  if (!name) { toast('Please enter an item name'); return; }
  if (!state.customBagItems) state.customBagItems = [];
  state.customBagItems.push({
    item: name,
    section: document.getElementById('ab-section').value,
    pri: document.getElementById('ab-pri').value,
    cat: '⭐ Custom Items',
    qty: 1,
  });
  saveState();
  document.getElementById('add-bag-modal').classList.remove('open');
  toast('Item added!');
  showPage('hospital-bag');
};

window.delBagItem = (ci) => {
  if (!state.customBagItems) return;
  state.customBagItems.splice(ci, 1);
  saveState(); showPage('hospital-bag');
};

function toggleBag(idx) {
  if (!state.hospitalBag[idx]) state.hospitalBag[idx] = {};
  state.hospitalBag[idx].packed = !state.hospitalBag[idx].packed;
  saveState();
  // re-render current tab
  const active = document.querySelector('.tab-btn.active');
  if (active) active.click();
}

// ── 100 FOODS ─────────────────────────────────────────────────────────────────
PAGES['foods'] = function(el) {
  const foodsDone = FOODS_ALL.filter((_,i) => state.foods[i]?.tried).length;
  const allergensDone = FOODS_ALL.filter((f,i) => f[5] && state.foods[i]?.tried).length;
  const allergensTotal = FOODS_ALL.filter(f => f[5]).length;
  const concerns = FOODS_ALL.filter((f,i) => state.foods[i]?.tried &&
    !['None','Loved it','Liked it','Neutral',''].includes(state.foods[i]?.reaction || 'None')).length;
  let selectedFood = null;
  let filterMode = 'all';
  let searchQ = '';
  let expandedGroups = Object.fromEntries(Object.keys(GROUP_META).map(g => [g, true]));

  function render() {
    const foodsDone = FOODS_ALL.filter((_,i) => state.foods[i]?.tried).length;
    const pct = Math.round(foodsDone);

    const filtered = FOODS_ALL.filter((f, i) => {
      const q = searchQ.toLowerCase();
      if (q && !f[1].toLowerCase().includes(q) && !f[2].toLowerCase().includes(q)) return false;
      if (filterMode === 'tried') return state.foods[i]?.tried;
      if (filterMode === 'untried') return !state.foods[i]?.tried;
      if (filterMode === 'allergen') return f[5];
      if (filterMode === 'concern') return state.foods[i]?.tried && !['None','Loved it','Liked it','Neutral',''].includes(state.foods[i]?.reaction || 'None');
      return true;
    });

    const byGroup = {};
    filtered.forEach(f => { if (!byGroup[f[2]]) byGroup[f[2]] = []; byGroup[f[2]].push(f); });

    let html = `
      <div class="grid-4" style="margin-bottom:14px">
        <div class="stat-card" style="background:#1B3A6B"><div class="val">${foodsDone}</div><div class="lbl">Foods tried</div></div>
        <div class="stat-card" style="background:#2D8F8F"><div class="val">${100-foodsDone}</div><div class="lbl">Remaining</div></div>
        <div class="stat-card" style="background:#C0392B"><div class="val">${allergensDone}/${allergensTotal}</div><div class="lbl">Allergens tried</div></div>
        <div class="stat-card" style="background:#854F0B"><div class="val">${concerns}</div><div class="lbl">Watch reactions</div></div>
      </div>
      <div class="card" style="margin-bottom:14px;padding:12px 16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600;color:#555">Progress: ${foodsDone}/100 foods</span>
          <span style="font-size:12px;font-weight:700;color:#2D8F8F">${pct}%</span>
        </div>
        ${pctBar(pct,'#2D8F8F',8)}
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:10px">
          ${Object.keys(GROUP_META).map(g => {
            const t = FOODS_ALL.filter(f => f[2]===g).length;
            const d = FOODS_ALL.filter((f,i) => f[2]===g && state.foods[i]?.tried).length;
            const {color} = GROUP_META[g];
            return `<div onclick="setFoodFilter('${g}')" style="cursor:pointer;padding:5px 8px;border-radius:6px;border:1.5px solid ${filterMode===g?color:'#eee'}">
              <div style="font-size:11px;font-weight:600;color:${color}">${g.split(' ')[0] === 'Protein' ? 'Protein' : g}</div>
              <div style="font-size:10px;color:#888">${d}/${t}</div>
              ${pctBar(t?d/t*100:0,color,3)}
            </div>`;
          }).join('')}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
        ${[['all','All'],['tried','Tried ✓'],['untried','Not tried'],['allergen','Allergens'],['concern','Concerns']].map(([v,l]) =>
          `<button class="tab-btn ${filterMode===v?'active':''}" onclick="setFoodFilter('${v}')">${l}</button>`
        ).join('')}
        <input type="text" placeholder="Search foods..." value="${searchQ}" oninput="foodSearch(this.value)"
          style="flex:1;min-width:130px;max-width:220px;padding:6px 10px;font-size:12px">
      </div>
    `;

    if (selectedFood !== null) {
      const f = FOODS_ALL[selectedFood];
      const s = state.foods[selectedFood] || {};
      const gm = GROUP_META[f[2]];
      const am = AGE_META[f[3]] || {};
      html += `<div class="card" style="margin-bottom:14px;border-left:4px solid ${gm.color}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:16px;font-weight:700;color:#1a1a1a">${f[0]}. ${f[1]}</div>
            <div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap">
              <span class="badge" style="background:${gm.bg};color:${gm.color}">${f[2]}</span>
              <span class="badge" style="background:${am.bg||'#f0f0f0'};color:${am.color||'#888'}">${f[3]}</span>
              ${f[4] ? `<span class="badge" style="background:#fff5f5;color:#888">Texture: ${f[4]}</span>` : ''}
              ${f[5] ? '<span class="badge" style="background:#FCEBEB;color:#C0392B">⚠ Top allergen — watch 48hrs</span>' : ''}
            </div>
          </div>
          <button onclick="selectedFood=null;renderFoods()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#aaa">✕</button>
        </div>
        <div class="detail-panel" style="margin-bottom:12px">
          <div class="dp-title">How to prepare (Indonesian kitchen)</div>
          ${f[6]}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:${s.tried?'12px':'0'}">
          <button class="btn ${s.tried?'btn-green':'btn-teal'}" onclick="toggleFood(${selectedFood})">${s.tried?'✓ Tried':'Mark as tried'}</button>
          ${s.tried ? `<input type="text" placeholder="Age tried (e.g. 7 months)" value="${s.ageTried||''}" oninput="setFoodAge(${selectedFood},this.value)" style="width:160px">` : ''}
        </div>
        ${s.tried ? `
          <div style="font-size:11px;font-weight:600;color:#777;margin-bottom:6px">Baby's reaction</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
            ${['None','Loved it','Liked it','Neutral','Refused','Mild rash','Hives','Vomiting','Diarrhea','Watch again'].map(r =>
              `<button onclick="setFoodReaction(${selectedFood},'${r}')" style="padding:4px 10px;border-radius:12px;border:1.5px solid ${(s.reaction||'None')===r?'#2D8F8F':'#ddd'};background:${(s.reaction||'None')===r?'#E1F5EE':'#fff'};color:${(s.reaction||'None')===r?'#0F6E56':'#555'};font-size:11px;cursor:pointer;font-family:inherit">${r}</button>`
            ).join('')}
          </div>
          <textarea placeholder="Notes — taste, texture, how prepared, baby's response..." rows="2" oninput="setFoodNotes(${selectedFood},this.value)"
            style="width:100%;resize:none;font-size:12px;padding:8px;border:1px solid #ddd;border-radius:6px;font-family:inherit">${s.notes||''}</textarea>
        ` : ''}
      </div>`;
    }

    Object.keys(GROUP_META).forEach(g => {
      const gFoods = byGroup[g];
      if (!gFoods || !gFoods.length) return;
      const {color, bg} = GROUP_META[g];
      const total = FOODS_ALL.filter(f => f[2]===g).length;
      const done = FOODS_ALL.filter((f,i) => f[2]===g && state.foods[i]?.tried).length;
      const exp = expandedGroups[g] !== false;
      html += `
        <div style="margin-bottom:10px">
          <div onclick="toggleFoodGroup('${g}')" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:${color};border-radius:8px;cursor:pointer;user-select:none;margin-bottom:${exp?'6px':'0'}">
            <span style="font-size:13px;font-weight:600;color:#fff;flex:1">${g}</span>
            <span style="font-size:11px;color:rgba(255,255,255,.8)">${done}/${total}</span>
            <div style="width:50px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden"><div style="height:4px;width:${total?Math.round(done/total*100):0}%;background:rgba(255,255,255,.85)"></div></div>
            <span style="color:rgba(255,255,255,.7);font-size:12px">${exp?'▾':'▸'}</span>
          </div>
          ${exp ? `<div class="food-grid">
            ${gFoods.map(f => {
              const i = f[0] - 1;
              const s = state.foods[i] || {};
              const am = AGE_META[f[3]] || {};
              const hasConcern = s.tried && !['None','Loved it','Liked it','Neutral',''].includes(s.reaction||'None');
              return `<div class="food-card ${s.tried?'tried':''} ${hasConcern?'concern':''}" onclick="selectFood(${i})"
                style="border-color:${selectedFood===i?color:''}">
                <span class="fnum">${f[0]}</span>
                <div class="fname">${f[1]}</div>
                <div><span class="fage" style="background:${am.bg||'#f0f0f0'};color:${am.color||'#888'}">${f[3]}</span>${f[5]?` <span class="badge" style="background:#FCEBEB;color:#C0392B;font-size:9px">allergen</span>`:''}</div>
                <div class="ftxt">${f[4]}</div>
                ${s.tried ? `<div style="font-size:10px;font-weight:600;color:${hasConcern?'#854F0B':'#0F6E56'};margin-top:4px">${s.reaction && s.reaction!=='None' ? s.reaction : '✓ Tried'}${s.ageTried?` · ${s.ageTried}`:''}</div>` : ''}
              </div>`;
            }).join('')}
          </div>` : ''}
        </div>
      `;
    });

    const container = document.getElementById('foods-content');
    if (container) container.innerHTML = html;
    else el.innerHTML = `<div class="page-header"><h2>🥣 100 Foods Before 1 Year</h2><p>Indonesia-optimised · ${foodsDone}/100 foods tried</p></div><div id="foods-content">${html}</div>`;
  }

  window.setFoodFilter = (f) => { filterMode = f; selectedFood = null; render(); };
  window.foodSearch = (q) => { searchQ = q; render(); };
  window.selectFood = (i) => { selectedFood = selectedFood === i ? null : i; render(); };
  window.toggleFood = (i) => { if (!state.foods[i]) state.foods[i] = {}; state.foods[i].tried = !state.foods[i].tried; if (!state.foods[i].tried) { state.foods[i].reaction = 'None'; } saveState(); render(); };
  window.setFoodReaction = (i, r) => { if (!state.foods[i]) state.foods[i] = {}; state.foods[i].reaction = r; saveState(); render(); };
  window.setFoodAge = (i, v) => { if (!state.foods[i]) state.foods[i] = {}; state.foods[i].ageTried = v; saveState(); };
  window.setFoodNotes = (i, v) => { if (!state.foods[i]) state.foods[i] = {}; state.foods[i].notes = v; saveState(); };
  window.toggleFoodGroup = (g) => { expandedGroups[g] = !expandedGroups[g]; render(); };
  window.renderFoods = render;

  el.innerHTML = `<div class="page-header"><h2>🥣 100 Foods Before 1 Year</h2><p>Indonesia-optimised · ${foodsDone}/100 foods tried</p></div><div id="foods-content"></div>`;
  render();
};

// ── FEEDING LOG ───────────────────────────────────────────────────────────────
PAGES['feeding'] = function(el) {
  function render() {
    const todayLogs = state.feedingLog.filter(l => l.date === today());
    const totalFeeds = todayLogs.length;
    const totalLeft = todayLogs.reduce((a,l) => a + (parseInt(l.leftMin)||0), 0);
    const totalRight = todayLogs.reduce((a,l) => a + (parseInt(l.rightMin)||0), 0);
    const totalFormula = todayLogs.reduce((a,l) => a + (parseInt(l.formulaMl)||0), 0);
    const totalPumped = todayLogs.reduce((a,l) => a + (parseInt(l.pumpedMl)||0), 0);

    el.innerHTML = `
      <div class="page-header"><h2>🍼 Feeding Log</h2><p>Today: ${totalFeeds} feeds · ${totalLeft+totalRight}min breast · ${totalFormula}ml formula</p></div>
      <div class="grid-4" style="margin-bottom:14px">
        <div class="stat-card" style="background:#0F6E56"><div class="val">${totalFeeds}</div><div class="lbl">Feeds today</div></div>
        <div class="stat-card" style="background:#2D8F8F"><div class="val">${totalLeft+totalRight}m</div><div class="lbl">Breast</div></div>
        <div class="stat-card" style="background:#534AB7"><div class="val">${totalFormula}ml</div><div class="lbl">Formula</div></div>
        <div class="stat-card" style="background:#854F0B"><div class="val">${totalPumped}ml</div><div class="lbl">Pumped</div></div>
      </div>

      <div class="card">
        <div class="card-title">Quick log</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <button class="btn btn-outline btn-sm" onclick="quickFeed('left',5)">L 5min</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('left',10)">L 10min</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('left',15)">L 15min</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('right',5)">R 5min</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('right',10)">R 10min</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('right',15)">R 15min</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('formula',60)">60ml formula</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('formula',90)">90ml formula</button>
          <button class="btn btn-outline btn-sm" onclick="quickFeed('formula',120)">120ml formula</button>
        </div>
        <button class="btn btn-outline btn-block btn-sm" onclick="toggleFeedForm()" id="feed-form-toggle">+ Full log entry</button>
      </div>

      <div class="card" id="feed-form-card" style="display:none">
        <div class="card-title">Full feed entry</div>
        <div class="log-input">
          <div><label>Date</label><input type="date" id="f-date" value="${today()}"></div>
          <div><label>Time</label><input type="time" id="f-time" value="${new Date().toTimeString().slice(0,5)}"></div>
          <div><label>Left breast (min)</label><input type="number" id="f-left" min="0" placeholder="0" inputmode="numeric"></div>
          <div><label>Right breast (min)</label><input type="number" id="f-right" min="0" placeholder="0" inputmode="numeric"></div>
          <div><label>Formula (ml)</label><input type="number" id="f-formula" min="0" placeholder="0" inputmode="numeric"></div>
          <div><label>Pumped (ml)</label><input type="number" id="f-pump" min="0" placeholder="0" inputmode="numeric"></div>
        </div>
        <textarea id="f-notes" placeholder="Notes (which side started, latch quality...)" rows="2"
          style="width:100%;resize:none;font-size:14px;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-family:inherit;margin-bottom:10px"></textarea>
        <button class="btn btn-teal btn-block" onclick="addFeed()">Add feed entry</button>
      </div>
      <div class="card">
        <div class="card-title">Feed history (most recent first)</div>
        ${state.feedingLog.slice().reverse().slice(0,40).map((l,ri) => {
          const i = state.feedingLog.length - 1 - ri;
          return `<div class="log-row">
            <span style="font-size:11px;color:#888;min-width:90px">${l.date} ${l.time}</span>
            <span class="log-cell" style="font-size:12px">${[
              l.leftMin ? `L:${l.leftMin}m` : '',
              l.rightMin ? `R:${l.rightMin}m` : '',
              l.formulaMl ? `Formula:${l.formulaMl}ml` : '',
              l.pumpedMl ? `Pumped:${l.pumpedMl}ml` : '',
            ].filter(Boolean).join(' · ') || '—'}</span>
            ${l.notes ? `<span style="font-size:11px;color:#888;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.notes}</span>` : ''}
            <button onclick="delFeed(${i})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0 4px">×</button>
          </div>`;
        }).join('') || '<div style="padding:12px;color:#aaa;text-align:center;font-size:13px">No feeds logged yet</div>'}
      </div>
    `;
  }

  window.addFeed = () => {
    state.feedingLog.push({
      date: document.getElementById('f-date').value,
      time: document.getElementById('f-time').value,
      leftMin: parseInt(document.getElementById('f-left').value)||0,
      rightMin: parseInt(document.getElementById('f-right').value)||0,
      formulaMl: parseInt(document.getElementById('f-formula').value)||0,
      pumpedMl: parseInt(document.getElementById('f-pump').value)||0,
      notes: document.getElementById('f-notes').value,
    });
    saveState(); render(); toast('Feed logged!');
  };
  window.quickFeed = (type, amount) => {
    const now = new Date();
    const entry = {
      date: today(),
      time: now.toTimeString().slice(0,5),
      leftMin: 0, rightMin: 0, formulaMl: 0, pumpedMl: 0,
      notes: 'Quick log',
    };
    if (type==='left') entry.leftMin = amount;
    else if (type==='right') entry.rightMin = amount;
    else if (type==='formula') entry.formulaMl = amount;
    else if (type==='pump') entry.pumpedMl = amount;
    state.feedingLog.push(entry);
    saveState(); render(); toast(type==='formula' ? amount+'ml formula logged!' : (type==='left'?'L ':type==='right'?'R ':'Pump ')+amount+(type==='pump'?'ml':' min')+' logged!');
  };
  window.toggleFeedForm = () => {
    const card = document.getElementById('feed-form-card');
    const btn = document.getElementById('feed-form-toggle');
    if (card) { 
      const open = card.style.display === 'none';
      card.style.display = open ? 'block' : 'none';
      if (btn) btn.textContent = open ? '− Hide form' : '+ Full log entry';
    }
  };
  window.delFeed = (i) => { state.feedingLog.splice(i,1); saveState(); render(); };
  render();
};

// ── SLEEP LOG ─────────────────────────────────────────────────────────────────
PAGES['sleep'] = function(el) {
  function render() {
    const todayLogs = state.sleepLog.filter(l => l.date === today());
    const totalHrs = todayLogs.reduce((a,l) => {
      if (!l.start || !l.end) return a;
      const s = new Date(`${l.date}T${l.start}`);
      const e = new Date(`${l.date}T${l.end}`);
      return a + Math.max(0, (e - s) / 3600000);
    }, 0);
    const longestStretch = todayLogs.reduce((max, l) => {
      if (!l.start || !l.end) return max;
      const h = Math.max(0, (new Date(`${l.date}T${l.end}`) - new Date(`${l.date}T${l.start}`)) / 3600000);
      return Math.max(max, h);
    }, 0);

    el.innerHTML = `
      <div class="page-header"><h2>😴 Sleep Log</h2><p>Today: ${totalHrs.toFixed(1)}hrs total · Longest stretch: ${longestStretch.toFixed(1)}hrs</p></div>
      <div class="grid-3" style="margin-bottom:14px">
        <div class="stat-card" style="background:#185FA5"><div class="val">${totalHrs.toFixed(1)}h</div><div class="lbl">Total sleep today</div></div>
        <div class="stat-card" style="background:#534AB7"><div class="val">${longestStretch.toFixed(1)}h</div><div class="lbl">Longest stretch</div></div>
        <div class="stat-card" style="background:#2D8F8F"><div class="val">${todayLogs.length}</div><div class="lbl">Sleep sessions</div></div>
      </div>
      <div class="card">
        <div class="card-title">Quick sleep log</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <button class="btn btn-outline btn-sm" onclick="quickSleep(30,'Day nap')">30min nap</button>
          <button class="btn btn-outline btn-sm" onclick="quickSleep(45,'Day nap')">45min nap</button>
          <button class="btn btn-outline btn-sm" onclick="quickSleep(90,'Day nap')">1.5hr nap</button>
          <button class="btn btn-outline btn-sm" onclick="quickSleep(180,'Night')">3hr night</button>
          <button class="btn btn-outline btn-sm" onclick="quickSleep(240,'Night')">4hr night</button>
          <button class="btn btn-outline btn-sm" onclick="quickSleep(360,'Night')">6hr night</button>
        </div>
        <button class="btn btn-outline btn-block btn-sm" onclick="toggleSleepForm()" id="sleep-form-toggle">+ Set exact times</button>
      </div>
      <div class="card" id="sleep-form-card" style="display:none">
        <div class="card-title">Full sleep entry</div>
        <div class="log-input">
          <div><label>Date</label><input type="date" id="s-date" value="${today()}"></div>
          <div><label>Type</label><select id="s-type"><option>Night</option><option>Day nap</option></select></div>
          <div><label>Sleep start</label><input type="time" id="s-start"></div>
          <div><label>Sleep end</label><input type="time" id="s-end"></div>
          <div><label>Quality</label><select id="s-qual"><option>Excellent</option><option>Good</option><option>Fair</option><option>Poor</option></select></div>
        </div>
        <input type="text" id="s-notes" placeholder="Notes (settled quickly, woke for feed...)" style="width:100%;margin-bottom:10px;padding:10px;font-size:14px">
        <button class="btn btn-teal btn-block" onclick="addSleep()">Log sleep</button>
      </div>
      <div class="card">
        <div class="card-title">Sleep history</div>
        ${state.sleepLog.slice().reverse().slice(0,30).map((l,ri) => {
          const i = state.sleepLog.length - 1 - ri;
          let dur = '';
          if (l.start && l.end) {
            const h = Math.max(0, (new Date(`${l.date}T${l.end}`) - new Date(`${l.date}T${l.start}`)) / 3600000);
            dur = `${h.toFixed(1)}hrs`;
          }
          return `<div class="log-row">
            <span style="font-size:11px;color:#888;min-width:80px">${l.date}</span>
            <span style="font-size:12px;min-width:120px">${l.start||'?'} → ${l.end||'?'}</span>
            <span style="font-size:12px;font-weight:600;color:#185FA5;min-width:50px">${dur}</span>
            <span class="badge" style="background:${l.type==='Night'?'#E6EFF8':'#EEEDFE'};color:${l.type==='Night'?'#1B3A6B':'#534AB7'}">${l.type}</span>
            <span style="font-size:11px;color:#888">${l.quality}</span>
            ${l.notes ? `<span style="font-size:11px;color:#aaa;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.notes}</span>` : ''}
            <button onclick="delSleep(${i})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:16px">×</button>
          </div>`;
        }).join('') || '<div style="padding:12px;color:#aaa;text-align:center;font-size:13px">No sleep logged yet</div>'}
      </div>
    `;
  }

  window.addSleep = () => {
    state.sleepLog.push({
      date: document.getElementById('s-date').value,
      start: document.getElementById('s-start').value,
      end: document.getElementById('s-end').value,
      type: document.getElementById('s-type').value,
      quality: document.getElementById('s-qual').value,
      notes: document.getElementById('s-notes').value,
    });
    saveState(); render(); toast('Sleep logged!');
  };
  window.quickSleep = (mins, type) => {
    const now = new Date();
    const end = now.toTimeString().slice(0,5);
    const startD = new Date(now - mins*60000);
    const start = startD.toTimeString().slice(0,5);
    state.sleepLog.push({ date: today(), start, end, type, quality: 'Good', notes: 'Quick log' });
    saveState(); render(); toast(mins >= 60 ? Math.floor(mins/60)+'hr '+(mins%60?mins%60+'min ':'')+(type)+' logged!' : mins+'min '+type+' logged!');
  };
  window.toggleSleepForm = () => {
    const card = document.getElementById('sleep-form-card');
    const btn = document.getElementById('sleep-form-toggle');
    if (card) {
      const open = card.style.display === 'none';
      card.style.display = open ? 'block' : 'none';
      if (btn) btn.textContent = open ? '− Hide form' : '+ Set exact times';
    }
  };
  window.delSleep = (i) => { state.sleepLog.splice(i,1); saveState(); render(); };
  render();
};

          const i = state.diaperLog.length - 1 - ri;
          return `<div class="log-row">
            <span style="font-size:11px;color:#888;min-width:90px">${l.date} ${l.time||''}</span>
            <span class="badge" style="background:${l.wet?'#E6F1FB':'#f5f5f5'};color:${l.wet?'#185FA5':'#aaa'}">Wet: ${l.wet?'Yes':'No'}</span>
            <span class="badge" style="background:${l.dirty?'#E1F5EE':'#f5f5f5'};color:${l.dirty?'#0F6E56':'#aaa'}">Dirty: ${l.dirty?'Yes':'No'}</span>

    const btn = document.getElementById('diaper-form-toggle');

// ── MILESTONES ────────────────────────────────────────────────────────────────
PAGES['milestones'] = function(el) {
  const ageGroups = [...new Set(MILESTONES.map(m => m[0]))];
  let filterDomain = 'all';
  let filterAchieved = 'all';

  function render() {
    const achieved = MILESTONES.filter((_,i) => state.milestones[i]?.achieved).length;
    const redFlagsAchieved = MILESTONES.filter((m,i) => m[5] && !state.milestones[i]?.achieved).length;
    const concerns = MILESTONES.filter((_,i) => state.milestones[i]?.concern).length;

    const filtered = MILESTONES.filter((m,i) => {
      if (filterDomain !== 'all' && m[3] !== filterDomain) return false;
      if (filterAchieved === 'achieved') return state.milestones[i]?.achieved;
      if (filterAchieved === 'pending') return !state.milestones[i]?.achieved;
      if (filterAchieved === 'concern') return state.milestones[i]?.concern;
      return true;
    });

    const byAge = {};
    filtered.forEach(m => { if (!byAge[m[0]]) byAge[m[0]] = []; byAge[m[0]].push(m); });

    let html = `
      <div class="grid-4" style="margin-bottom:14px">
        <div class="stat-card" style="background:#1B3A6B"><div class="val">${achieved}</div><div class="lbl">Achieved</div></div>
        <div class="stat-card" style="background:#2D8F8F"><div class="val">${MILESTONES.length - achieved}</div><div class="lbl">Pending</div></div>
        <div class="stat-card" style="background:#C0392B"><div class="val">${redFlagsAchieved}</div><div class="lbl">Red flags pending</div></div>
        <div class="stat-card" style="background:#854F0B"><div class="val">${concerns}</div><div class="lbl">Flagged</div></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${['all','Gross Motor','Fine Motor','Language','Social','Cognitive','Emotional'].map(d =>
          `<button class="tab-btn ${filterDomain===d?'active':''}" onclick="setMilDomain('${d}')">${d==='all'?'All domains':d}</button>`
        ).join('')}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        ${[['all','All'],['achieved','Achieved ✓'],['pending','Pending'],['concern','Flagged']].map(([v,l]) =>
          `<button class="tab-btn ${filterAchieved===v?'active':''}" onclick="setMilFilter('${v}')">${l}</button>`
        ).join('')}
      </div>
    `;

    ageGroups.forEach(age => {
      const ageMils = byAge[age];
      if (!ageMils || !ageMils.length) return;
      const total = MILESTONES.filter(m => m[0] === age).length;
      const done = MILESTONES.filter((m,i) => m[0] === age && state.milestones[i]?.achieved).length;
      html += `<div class="section-hdr" style="background:#1B3A6B">${age} <span style="font-size:11px;opacity:.7;margin-left:6px">${done}/${total} achieved</span></div>
        <div class="card" style="padding:4px 0;margin-bottom:6px">
        ${ageMils.map(m => {
          const i = MILESTONES.indexOf(m);
          const s = state.milestones[i] || {};
          const color = DOMAIN_COLORS[m[3]] || '#888';
          return `<div class="milestone-row ${s.achieved?'achieved':''}">
            <div class="domain-dot" style="background:${color}"></div>
            <div style="flex:1">
              <div class="mtext" style="font-size:13px;line-height:1.4;${m[5]?'font-weight:600;color:#C0392B':''}">${m[2]}${m[5]?' 🚨':''}</div>
              <div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap">
                <span class="badge" style="background:${color}22;color:${color}">${m[3]}</span>
                ${s.date ? `<span style="font-size:10px;color:#888">Achieved: ${s.date}</span>` : ''}
                ${m[4] ? `<span style="font-size:10px;color:#aaa;font-style:italic">${m[4].substring(0,60)}${m[4].length>60?'…':''}</span>` : ''}
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;margin-left:8px">
              <button onclick="toggleMilestone(${i})" style="padding:4px 10px;border-radius:10px;border:1.5px solid ${s.achieved?'#0F6E56':'#ddd'};background:${s.achieved?'#E1F5EE':'transparent'};color:${s.achieved?'#0F6E56':'#888'};font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap">
                ${s.achieved?'✓ Done':'Mark done'}
              </button>
              <button onclick="toggleConcern(${i})" style="padding:3px 8px;border-radius:10px;border:1.5px solid ${s.concern?'#C0392B':'#ddd'};background:${s.concern?'#FCEBEB':'transparent'};color:${s.concern?'#C0392B':'#aaa'};font-size:10px;cursor:pointer;font-family:inherit">
                ${s.concern?'⚠ Flagged':'Flag concern'}
              </button>
            </div>
          </div>`;
        }).join('')}
        </div>`;
    });

    if (!Object.keys(byAge).length) html += '<div class="card" style="text-align:center;color:#aaa;padding:24px">No milestones match this filter.</div>';

  // Custom milestones
  const customMils = state.customMilestones || [];
  if (customMils.length > 0 && filterAchieved !== 'concern') {
    html += `<div class="section-hdr" style="background:#534AB7">⭐ Custom Milestones & Notes</div><div class="card" style="padding:4px 0;margin-bottom:6px">`;
    customMils.forEach((m, ci) => {
      const idx = MILESTONES.length + ci;
      const s = state.milestones[idx] || {};
      html += `<div class="milestone-row ${s.achieved?'achieved':''}">
        <div class="domain-dot" style="background:#534AB7"></div>
        <div style="flex:1" onclick="toggleCustomMil(${ci})">
          <div class="mtext" style="font-size:13px">${m.text}</div>
          <div style="font-size:10px;color:#888;margin-top:2px">${m.age||''}${s.date?' · '+s.date:''}</div>
        </div>
        <div style="display:flex;gap:6px;margin-left:8px">
          <button onclick="toggleCustomMil(${ci})" style="padding:4px 10px;border-radius:10px;border:1.5px solid ${s.achieved?'#0F6E56':'#ddd'};background:${s.achieved?'#E1F5EE':'#fff'};color:${s.achieved?'#0F6E56':'#888'};font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit">
            ${s.achieved?'✓ Done':'Mark done'}
          </button>
          <button onclick="delCustomMil(${ci})" class="del-btn">✕</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<button class="btn btn-teal btn-block" onclick="openAddMilModal()" style="margin-bottom:80px">+ Add custom milestone / note</button>`;

    const container = document.getElementById('mil-content');
    if (container) container.innerHTML = html;
    else el.innerHTML = `<div class="page-header"><h2>⭐ Developmental Milestones</h2><p>Birth through age 5 · AAP-aligned · ${achieved}/${MILESTONES.length} achieved</p></div><div id="mil-content">${html}</div>`;
  }

  window.openAddMilModal = () => {
    let mo = document.getElementById('add-mil-modal');
    if (!mo) {
      mo = document.createElement('div');
      mo.className = 'modal-overlay';
      mo.id = 'add-mil-modal';
      mo.innerHTML = `<div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">➕ Add Custom Milestone / Note</div>
        <div class="modal-field"><label>Milestone / observation *</label>
          <textarea id="am-text" rows="2" placeholder="e.g. First smile · Said 'mama' clearly · Waved at grandma" style="font-size:14px;padding:10px;border:1.5px solid #ddd;border-radius:8px;width:100%;font-family:inherit;resize:none"></textarea>
        </div>
        <div class="modal-field"><label>Age / date</label><input type="text" id="am-age" placeholder="e.g. 3 months, 2 weeks"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="document.getElementById('add-mil-modal').classList.remove('open')">Cancel</button>
          <button class="btn btn-teal" onclick="saveCustomMil()">Save milestone</button>
        </div>
      </div>`;
      document.body.appendChild(mo);
      mo.addEventListener('click', e => { if(e.target===mo) mo.classList.remove('open'); });
    }
    mo.classList.add('open');
  };

  window.saveCustomMil = () => {
    const text = document.getElementById('am-text').value.trim();
    if (!text) { toast('Please describe the milestone'); return; }
    if (!state.customMilestones) state.customMilestones = [];
    state.customMilestones.push({ text, age: document.getElementById('am-age').value });
    saveState();
    document.getElementById('add-mil-modal').classList.remove('open');
    toast('Milestone saved! 🌟');
    render();
  };

  window.toggleCustomMil = (ci) => {
    const idx = MILESTONES.length + ci;
    if (!state.milestones[idx]) state.milestones[idx] = {};
    state.milestones[idx].achieved = !state.milestones[idx].achieved;
    if (state.milestones[idx].achieved && !state.milestones[idx].date) state.milestones[idx].date = today();
    saveState(); render();
  };

  window.delCustomMil = (ci) => {
    if (!state.customMilestones) return;
    state.customMilestones.splice(ci, 1);
    saveState(); render();
  };

  window.setMilDomain = (d) => { filterDomain = d; render(); };
  window.setMilFilter = (f) => { filterAchieved = f; render(); };
  window.toggleMilestone = (i) => {
    if (!state.milestones[i]) state.milestones[i] = {};
    state.milestones[i].achieved = !state.milestones[i].achieved;
    if (state.milestones[i].achieved && !state.milestones[i].date) state.milestones[i].date = today();
    saveState(); render();
  };
  window.toggleConcern = (i) => {
    if (!state.milestones[i]) state.milestones[i] = {};
    state.milestones[i].concern = !state.milestones[i].concern;
    saveState(); render();
  };

  el.innerHTML = `<div class="page-header"><h2>⭐ Developmental Milestones</h2><p>Birth through age 5 · AAP-aligned</p></div><div id="mil-content"></div>`;
  render();
};

// ── VACCINES ──────────────────────────────────────────────────────────────────
PAGES['vaccines'] = function(el) {
  if (!state.customVaccines) state.customVaccines = [];

  function render() {
    const allVax = [...VACCINES, ...state.customVaccines];
    const givenCount = allVax.filter((_,i) => state.vaccines[i]?.given).length;

    let cardsHTML = allVax.map((v,i) => {
      const s = state.vaccines[i] || {};
      const isCustom = i >= VACCINES.length;
      const dueDate = v.daysFromBirth != null
        ? new Date(DUE_DATE.getTime() + v.daysFromBirth * 86400000)
        : (v.dueDate ? new Date(v.dueDate) : null);
      const overdue = !s.given && dueDate && dueDate < new Date();
      return `<div class="vax-card ${s.given?'given':''} ${overdue?'overdue':''}">
        <div class="vax-card-top">
          <div class="vax-check ${s.given?'given':''}" onclick="toggleVax(${i})">${s.given?'✓':''}</div>
          <div style="flex:1">
            <div class="vax-name">${v.name}${isCustom?' <span style="font-size:9px;background:#EEEDFE;color:#534AB7;padding:1px 5px;border-radius:4px">Custom</span>':''}</div>
            <div class="vax-meta">
              <span class="vax-pill" style="background:#E6F1FB;color:#185FA5">${v.age}</span>
              ${dueDate ? `<span class="vax-pill" style="background:${overdue?'#FCEBEB':'#F0F0F0'};color:${overdue?'#C0392B':'#666'}">${overdue?'⚠ Overdue: ':'Due: '}${formatDate(dueDate)}</span>` : ''}
              ${s.given ? `<span class="vax-pill" style="background:#E1F5EE;color:#0F6E56">✓ Given ${s.date ? formatDate(s.date) : ''}</span>` : ''}
            </div>
            ${v.notes ? `<div class="vax-notes">${v.notes}</div>` : ''}
          </div>
          ${isCustom ? `<button onclick="delCustomVax(${i})" class="del-btn" style="flex-shrink:0">✕</button>` : ''}
        </div>
        <div class="vax-date-row">
          <label>Date given:</label>
          <input type="date" value="${s.date||''}" onchange="setVaxDate(${i},this.value)">
        </div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="page-header">
        <h2>💉 Vaccination Schedule</h2>
        <p>Indonesia (Kemenkes + IDAI 2024) · ${givenCount}/${allVax.length} vaccines given</p>
      </div>
      <div class="card" style="background:#FFF9E6;border:1px solid #F0C060;margin-bottom:14px;padding:10px 14px;font-size:12px">
        <b>Evidence note:</b> All vaccines are recommended by Kemenkes & IDAI. Discuss concerns with your pediatrician — do not delay without medical advice.
      </div>
      <div style="margin-bottom:16px">${cardsHTML}</div>
      <button class="btn btn-teal btn-block" onclick="openAddVaxModal()" style="margin-bottom:80px">
        + Add custom vaccine
      </button>
    `;
  }

  // Add vaccine modal
  window.openAddVaxModal = () => {
    let m = document.getElementById('add-vax-modal');
    if (!m) {
      m = document.createElement('div');
      m.className = 'modal-overlay';
      m.id = 'add-vax-modal';
      m.innerHTML = `<div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">➕ Add Custom Vaccine</div>
        <div class="modal-field"><label>Vaccine name *</label><input type="text" id="av-name" placeholder="e.g. Varicella (Chickenpox)"></div>
        <div class="modal-field"><label>Recommended age</label><input type="text" id="av-age" placeholder="e.g. 12 months"></div>
        <div class="modal-field"><label>Due date</label><input type="date" id="av-due"></div>
        <div class="modal-field"><label>Notes / clinic</label><input type="text" id="av-notes" placeholder="e.g. Private clinic, optional"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="document.getElementById('add-vax-modal').classList.remove('open')">Cancel</button>
          <button class="btn btn-teal" onclick="saveCustomVax()">Add vaccine</button>
        </div>
      </div>`;
      document.body.appendChild(m);
      m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
    }
    m.classList.add('open');
  };

  window.saveCustomVax = () => {
    const name = document.getElementById('av-name').value.trim();
    if (!name) { toast('Please enter a vaccine name'); return; }
    if (!state.customVaccines) state.customVaccines = [];
    state.customVaccines.push({
      name,
      age: document.getElementById('av-age').value || 'Custom',
      dueDate: document.getElementById('av-due').value || null,
      daysFromBirth: null,
      notes: document.getElementById('av-notes').value || 'Custom vaccine',
    });
    saveState();
    document.getElementById('add-vax-modal').classList.remove('open');
    toast('Vaccine added!');
    render();
  };

  window.delCustomVax = (i) => {
    const ci = i - VACCINES.length;
    if (ci >= 0 && confirm('Remove this custom vaccine?')) {

PAGES['rie'] = function(el) {
  const rieData = [
    {age:"0–3 Months",principle:"Sportscasting: narrate care routines. Ask permission before touching. Pause before responding — observe first.",say:["'I'm going to pick you up now.'","'I'm going to change your nappy. Are you ready?'","'You seem uncomfortable — let me check what you need.'","'I see you're watching the light on the wall.'"],notSay:["'Don't cry!' — dismisses communication","'You're okay!' — before assessing","'Look at the toy!' — distracts instead of acknowledges","'Good baby!' — evaluative vs observational"],obs:"Watch baby for 5 min without intervening. Note: What did baby look at? What movement patterns? What communicated satisfaction or discomfort?"},
    {age:"3–6 Months",principle:"Allow time to respond. Don't rush to pick up every sound — observe if it's communication or exploration. Trust competence.",say:["'You found your hand! You've been exploring that for a while.'","'I'm going to put you down now. I'll be right here.'","'You seem frustrated — that grasping is hard work.'"],notSay:["'Let me help you!' (when not needed)","'He loves it when I do this!' (projection)","'Almost! Almost!' (creates dependency on our narration)"],obs:"Watch for: what initiates their movement? What stops it? Note 3 things baby did with full concentration without adult initiation."},
    {age:"6–12 Months",principle:"Respect in transitions. Give notice before disruption. Allow struggle in safe situations. Say what you mean, mean what you say.",say:["'In one minute we're going to change your nappy.'","'I won't let you hurt the cat.'","'You can be upset. I'm here.'","'That was hard. You kept trying.'"],notSay:["'In a second' (then doing immediately)","'Don't touch that' without explanation","'It doesn't hurt' (after a fall)","'Say sorry!' (at this age meaningless)"],obs:"Practice 2x daily: watch for 3 minutes before intervening. Ask: was my help requested? Or did I assume?"},
    {age:"1–2 Years",principle:"Give authentic limits with empathy. No means no. Acknowledge feelings before problem-solving.",say:["'You really want to keep playing. It's hard to stop. We're leaving in 2 minutes.'","'I won't let you hit. I'll hold your hand.'","'You're so angry right now. I'm right here.'","'You can choose: red shirt or blue?'"],notSay:["Hollow threats: 'If you do that again...'","Conditional love: 'Stop crying or we're not going to the park'","Labelling: 'You're being naughty'","'Big boys/girls don't cry'"],obs:"After challenging moments: note what preceded the behaviour. What was the child trying to communicate? What need wasn't met?"},
    {age:"2–3 Years",principle:"Trust that child can handle disappointment. Don't rescue from natural consequences. Connect before correcting.",say:["'That was scary when you fell. Your body knows how to handle that.'","'You didn't want to stop. That was really disappointing.'","'I see you want a biscuit. We're having dinner soon. I'll remember.'"],notSay:["'I told you so!'","'See what happens when you don't listen?'","'Why did you do that?' (young children cannot answer abstract 'why')"],obs:"When child has meltdown, after they calm, follow their lead. Don't debrief or lecture. Let them return to play."},

  ];

    ${rieData.map(r => `

            ${r.say.map(s => `<div style="padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:12px;color:#333">${s}</div>`).join('')}

let _editingSlot = null;

function openNavCustomizer() {
  closeDrawer();

function renderNavCustomizer() {
  const slots = getNavSlots();
  const m = document.getElementById('nav-customizer-modal');
  if (!m) return;
  m.innerHTML = `<div class="modal-sheet" style="max-height:90vh">
    <div class="modal-handle"></div>
    <div class="modal-title">📱 Customise Bottom Navigation</div>
    <p style="font-size:12px;color:#888;margin-bottom:14px">Tap a slot to change it. The ☰ More button is always last.</p>
