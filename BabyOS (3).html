      ${slots.map((pageId, i) => {
        const p = ALL_PAGES.find(x => x.id === pageId) || {icon:'❓',label:'Unknown'};
        return `<div class="nav-slot filled" onclick="pickNavSlot(${i})">
          <span class="nav-slot-num">${i+1}</span>
          <span class="nav-slot-icon">${p.icon}</span>
          <span class="nav-slot-label">${p.label}</span>
          <span class="nav-slot-clear" onclick="clearNavSlot(event,${i})">✕</span>
        </div>`;
      }).join('')}
      <div class="nav-slot" style="opacity:.5;cursor:default">
        <span class="nav-slot-num">5</span>
        <span class="nav-slot-icon">☰</span>
        <span class="nav-slot-label">More (fixed)</span>
      </div>
    </div>
    <div style="font-size:11px;color:#888;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Tap a slot above to choose a page</div>
    <div class="page-picker-list" id="nav-page-picker" style="display:none"></div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn btn-outline" onclick="resetNavSlots()">Reset to default</button>
      <button class="btn btn-teal" onclick="document.getElementById('nav-customizer-modal').classList.remove('open');renderBottomNav(_currentPage);toast('Navigation saved!')">Done</button>
    </div>
  </div>`;
}

function pickNavSlot(slotIndex) {
  _editingSlot = slotIndex;
  const slots = getNavSlots();
  const picker = document.getElementById('nav-page-picker');
  if (!picker) return;
  picker.style.display = 'block';
  const groups = [...new Set(ALL_PAGES.map(p => p.group))];
  let html = '';
  groups.forEach(group => {
    const pages = ALL_PAGES.filter(p => p.group === group);
    html += '<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;padding:8px 14px 4px;background:#fafafa">' + group + '</div>';
    pages.forEach(p => {
      const inUse = slots.includes(p.id) && slots.indexOf(p.id) !== slotIndex;
      const isCurrent = slots[slotIndex] === p.id;
      const clickHandler = inUse ? '' : ['setNavSlot(', slotIndex, ',\'', p.id, '\')'].join('');
      html += '<div class="page-picker-item"';
      if (clickHandler) html += ' onclick="' + clickHandler + '"';
      html += ' style="opacity:' + (inUse ? '.4' : '1') + ';cursor:' + (inUse ? 'default' : 'pointer') + '">';
      html += '<span class="page-picker-icon">' + p.icon + '</span>';
      html += '<div>';
      html += '<div class="page-picker-name">' + p.label + (isCurrent ? ' ✓' : '') + '</div>';
      html += '<div class="page-picker-group">' + p.group + (inUse ? ' · already in nav' : '') + '</div>';
      html += '</div></div>';
    });
  });
  picker.innerHTML = html;
}

function setNavSlot(slotIndex, pageId) {
  if (!state.navSlots) state.navSlots = [...DEFAULT_NAV];
  state.navSlots[slotIndex] = pageId;
  saveState();
  renderNavCustomizer();
  // re-pick to show updated state
  pickNavSlot(slotIndex);
}

function clearNavSlot(e, slotIndex) {
  e.stopPropagation();
  if (!state.navSlots) state.navSlots = [...DEFAULT_NAV];
  state.navSlots[slotIndex] = 'dashboard'; // fallback to dashboard
  saveState();
  renderNavCustomizer();
}

function resetNavSlots() {
  state.navSlots = [...DEFAULT_NAV];
  saveState();
  renderNavCustomizer();
  const picker = document.getElementById('nav-page-picker');
  if (picker) picker.style.display = 'none';
  toast('Navigation reset to default');
}

// ── BABY IDENTITY HELPERS ──────────────────────────────────────────────────
function babyName() { return state.babyName || null; }
function babyGender() { return state.babyGender || null; } // 'boy','girl','surprise'
function babyEmoji() {
  const g = babyGender();
  if (g === 'boy') return '👦';
  if (g === 'girl') return '👧';
  return '🍼';
}
function pronoun(type) {
  const g = babyGender();
  if (type === 'he/she') return g==='boy'?'he':g==='girl'?'she':'they';
  if (type === 'his/her') return g==='boy'?'his':g==='girl'?'her':'their';
  if (type === 'him/her') return g==='boy'?'him':g==='girl'?'her':'them';
  return 'they';
}
function babyRef() { return babyName() || 'Baby'; }

function updateSubtitles() {
  const name = babyName();
  const emoji = babyEmoji();

  // Top bar title
  const titleEl = document.getElementById('top-bar-title');
  if (titleEl) {
    if (name && state.babyDOB) {
      titleEl.innerHTML = emoji + ' ' + name;
      titleEl.style.fontSize = '18px';
    } else {
      titleEl.textContent = '🍼 Baby OS';
      titleEl.style.fontSize = '';
    }
  }

  // Subtitle (age)
  let txt = 'Due: 19 June 2026';
  if (state.babyDOB) {
    const d = Math.max(0, Math.floor((new Date() - new Date(state.babyDOB)) / 86400000));
    const mo = Math.floor(d / 30.5);
    txt = mo > 0 ? mo + ' month' + (mo!==1?'s':'') + ' old' : d + ' days old';
    if (name) txt = name + ' · ' + txt;
  }
  ['top-bar-sub','drawer-sub','sidebar-subtitle'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = txt; if (state.babyDOB) el.style.color = '#7FDDCC'; }
  });

  // Update drawer logo name too
  const drawerH1 = document.querySelector('.drawer-header h1');
  if (drawerH1) {
    drawerH1.textContent = (name && state.babyDOB) ? emoji + ' ' + name + "'s OS" : '🍼 Baby OS';
  }
}
updateSubtitles();
renderBottomNav('dashboard');
navTo('dashboard');
</script>
